<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - BITGAMESO</title>
    <link rel="stylesheet" href="inicio.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="login-header">
        <div class="logo-container-header">
            <img src="../assets/logo/Coin-128.png" alt="Logo BITGAMESO" class="mini-logo">
            <h1>BITGAMESO</h1>
        </div>
    </header>

    <main class="registro-container">
        <h2>Nueva Contraseña</h2>

        <!-- ESTADO 1: Cargando -->
        <div id="estado-cargando" style="text-align:center; padding:20px 0;">
            <p style="color:#CBA6F7; font-size:0.9rem;">Verificando enlace...</p>
        </div>

        <!-- ESTADO 2: Link expirado -->
        <div id="estado-expirado" style="display:none; text-align:center;">
            <p style="font-size:2rem; margin-bottom:8px;"></p>
            <p style="font-size:0.9rem; color:#e74c3c; font-weight:700; margin-bottom:8px;">
                Este enlace ha expirado o ya fue usado.
            </p>
            <p style="font-size:0.82rem; color:#666; margin-bottom:20px;">
                Los links de recuperacion solo son validos por 1 hora y un solo uso.
                Solicita uno nuevo desde el login.
            </p>
            <a href="inico.html">
                <button style="background:#CBA6F7; margin-top:0;">Volver al Login y pedir otro</button>
            </a>
        </div>

        <!-- ESTADO 3: Formulario listo -->
        <div id="estado-formulario" style="display:none;">
            <p style="font-size:0.85rem; color:#666; margin-bottom:16px;">
                Escribe tu nueva contrasena para BITGAMESO.
            </p>
            <form id="form-reset">
                <input type="password" id="new-pass"     placeholder="Nueva contrasena (min. 6 caracteres)" required>
                <input type="password" id="confirm-pass" placeholder="Confirmar contrasena" required>
                <button type="submit">Guardar contrasena</button>
            </form>
            <div id="msg-reset" style="
                margin-top:12px; padding:10px 14px;
                border-radius:10px; font-size:0.85rem; display:none;
            "></div>
        </div>
    </main>

    <footer class="footer-login">
        <p>Esta app es solo para fines educativos</p>
    </footer>

    <script type="module">
        import { supabase } from '../Supabase/supabase-client.js';

        const elCargando   = document.getElementById('estado-cargando');
        const elExpirado   = document.getElementById('estado-expirado');
        const elFormulario = document.getElementById('estado-formulario');
        const msgEl        = document.getElementById('msg-reset');

        const mostrarMsg = (texto, tipo) => {
            msgEl.textContent      = texto;
            msgEl.style.display    = 'block';
            msgEl.style.background = tipo === 'error' ? '#ffeaea' : '#eaffea';
            msgEl.style.border     = tipo === 'error' ? '2px solid #f38ba8' : '2px solid #a8e6cf';
            msgEl.style.color      = tipo === 'error' ? '#c0392b' : '#27ae60';
        };

        // ── 1. Detectar error de token en la URL ─────────────────────
        // Supabase pone los params en el hash (#error=...&error_code=otp_expired...)
        const hashStr    = window.location.hash.replace('#', '');
        const hashParams = new URLSearchParams(hashStr);
        const urlParams  = new URLSearchParams(window.location.search);

        const errorCode = hashParams.get('error_code') || urlParams.get('error_code') || '';

        if (errorCode === 'otp_expired' || errorCode === 'access_denied') {
            elCargando.style.display = 'none';
            elExpirado.style.display = 'block';
        } else {
            // ── 2. Esperar evento PASSWORD_RECOVERY de Supabase ──────
            let resolved = false;

            const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
                if (resolved) return;
                if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
                    resolved = true;
                    elCargando.style.display   = 'none';
                    elFormulario.style.display = 'block';
                    subscription.unsubscribe();
                }
            });

            // Timeout de 6s: si no detecta nada, asumir expirado
            setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    elCargando.style.display = 'none';
                    elExpirado.style.display = 'block';
                    subscription.unsubscribe();
                }
            }, 6000);
        }

        // ── 3. Guardar nueva contraseña ───────────────────────────────
        document.getElementById('form-reset').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p1  = document.getElementById('new-pass').value;
            const p2  = document.getElementById('confirm-pass').value;
            const btn = e.target.querySelector('button[type="submit"]');

            if (p1 !== p2) {
                mostrarMsg('Las contrasenas no coinciden.', 'error');
                return;
            }
            if (p1.length < 6) {
                mostrarMsg('La contrasena debe tener al menos 6 caracteres.', 'error');
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Guardando...';

            const { error } = await supabase.auth.updateUser({ password: p1 });

            if (error) {
                mostrarMsg('Error: ' + error.message, 'error');
                btn.disabled    = false;
                btn.textContent = 'Guardar contrasena';
            } else {
                mostrarMsg('Contrasena actualizada! Redirigiendo al login...', 'ok');
                setTimeout(() => { window.location.href = 'inico.html'; }, 2500);
            }
        });
    </script>
</body>
</html>
