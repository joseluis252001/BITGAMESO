<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BITGAMESO</title>
    <link rel="manifest" href="/manifest.json">
    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BITGAMESO">
    <link rel="apple-touch-icon" href="/src/assets/logo/Coin-128.png">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="/src/InicioCuenta/inicio.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="login-header">
        <div class="logo-container-header">
            <img src="../assets/logo/Coin-128.png" alt="Logo BITGAMESO" class="mini-logo">
            <h1>BITGAMESO</h1>
        </div>
    </header>

    <main class="registro-container">
        <div class="back-container">
            <a href="../PaginaMenu/menu-index.html" class="btn-back">
                <img src="../assets/arrows/Arrow-Complete-Left-128.png" alt="Volver" class="arrow-icon">
                <span>Volver</span>
            </a>
        </div>

        <h2>Iniciar Sesión</h2>
        <form id="form-login">
            <input type="text" id="login-usuario" placeholder="Usuario o correo electrónico" required>
            <input type="password" id="login-pass" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>

        <!-- Botón recuperar contraseña -->
        <div style="margin-top: 10px; text-align: center;">
            <button id="btn-olvide" style="
                background: none;
                border: none;
                color: #CBA6F7;
                font-size: 0.8rem;
                font-weight: bold;
                cursor: pointer;
                font-family: 'Poppins', sans-serif;
                padding: 4px 0;
                text-decoration: underline;
                width: auto;
            ">¿Olvidaste tu contraseña?</button>
        </div>

        <p style="margin-top: 12px; font-size: 0.8rem;">
            ¿No tienes cuenta? <a href="../CrearCuenta/registro.html" class="link-highlight">Regístrate aquí</a>
        </p>
    </main>

    <footer class="footer-login">
        <p>Esta app es solo para fines educativos</p>
    </footer>

    <!-- Supabase como módulo ES -->
    <script type="module" src="inico.js"></script>
</body>
</html>
