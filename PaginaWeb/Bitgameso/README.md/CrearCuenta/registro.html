<!DOCTYPE html>
<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleRegistro.css">
</head>
<main>
    <section class="registro-container">
        <h2>Únete a BITGAMESO</h2>
        <form id="form-registro">
            <input type="text" placeholder="Nombre de usuario" required>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <input type="password" id="pass2" placeholder="Confirmar contraseña" required>
            <button type="submit">Registrarme</button>
        </form>
        <!-- Botón pequeño para iniciar sesión -->
    <p style="margin-top: 15px; font-size: 0.8rem;">
        ¿Ya tienes cuenta? <a href="../PaginaMenu/index.html" style="color: #CBA6F7; font-weight: bold;">Iniciar sesión</a>
    </p>
    </section>
</main>

<footer>
    <p>Esta app es solo para fines educativos</p>
</footer>
