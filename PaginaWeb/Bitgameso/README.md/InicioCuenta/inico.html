<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BITGAMESO</title>
    <link rel="stylesheet" href="../CrearCuenta/styleRegistro.css">
    <link rel="stylesheet" href="inicio.css">
</head>
<body>

    <main class="registro-container">
        <h2>Iniciar Sesión</h2>
        <form id="form-login">
            <input type="text" id="login-usuario" placeholder="Nombre de usuario" required>
            <input type="password" id="login-pass" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        
        <p style="margin-top: 15px; font-size: 0.8rem;">
            ¿No tienes cuenta? <a href="../CrearCuenta/registro.html" style="color: #CBA6F7; font-weight: bold;">Regístrate aquí</a>
        </p>
    </main>

    <footer>
        <p>Esta app es solo para fines educativos</p>
    </footer>

    <script src="inico.js"></script>
</body>
</html>
