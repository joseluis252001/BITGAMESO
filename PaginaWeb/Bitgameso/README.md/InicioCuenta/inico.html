<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BITGAMESO</title>
    <link rel="stylesheet" href="inicio.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="login-header">
        <div class="logo-container-header">
            <img src="../assets/logo/Coin-128.png" alt="Logo BITGAMESO" class="mini-logo">
            <h1>BITGAMESO</h1>
        </div>
    </header>

    <main class="registro-container">
        <div class="back-container">
            <a href="../PaginaMenu/index.html" class="btn-back">
                <img src="../assets/arrows/Arrow-Complete-Left-128.png" alt="Volver" class="arrow-icon">
                <span>Volver</span>
            </a>
        </div>

        <h2>Iniciar Sesión</h2>
        <form id="form-login">
            <input type="text" id="login-usuario" placeholder="Nombre de usuario" required>
            <input type="password" id="login-pass" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        
        <p style="margin-top: 15px; font-size: 0.8rem;">
            ¿No tienes cuenta? <a href="../CrearCuenta/registro.html" class="link-highlight">Regístrate aquí</a>
        </p>
    </main>

    <footer class="footer-login">
        <p>Esta app es solo para fines educativos</p>
    </footer>

    <script src="inico.js"></script>
</body>
</html>
